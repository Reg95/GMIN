# general settings
name: MAGN_C56_adan_ema_x8_DIV2K_fine_tune_10k_ffn-dw5_set5
model_type: SRModel
scale: 8
num_gpu: 1  # set num_gpu: 0 for cpu mode
manual_seed: 42

# dataset and data loader settings
datasets:
  train:
    name: DF2K
    type: PairedImageDataset
    # dataroot_gt: datasets/DF2K/DF2K_train_HR_sub
    # dataroot_lq: datasets/DF2K/DF2K_train_LR_bicubic/X4_sub
    # meta_info_file: basicsr/data/meta_info/meta_info_DF2K3450sub_GT.txt
    # (for lmdb)
#    dataroot_gt: C:\Dataset\train\DF2K_train_HR_sub
#    dataroot_lq: C:\Dataset\train\DF2K_train_LR_bicubic_X4_sub
    dataroot_gt: C:\Dataset\train\DIV2K_train_HR_sub   #C:\Dataset\DF2K\train\HR\x.lmdb
    dataroot_lq: C:\Dataset\train\DIV2K_train_LR_bicubic_x8_sub #C:\Dataset\DF2K\train\LR\x4.lmdb

    io_backend:
       type: disk
      # (for lmdb)
#      type: lmdb

    gt_size: 480
    use_hflip: true
    use_rot: true

    # data loader
    num_worker_per_gpu: 6
    batch_size_per_gpu: 8
    dataset_enlarge_ratio: 100
    prefetch_mode: cuda
    pin_memory: true

  val:
    name: DIV2K_val
    type: PairedImageDataset
    dataroot_gt: C:\Dataset\val\DIV2K_valid_HR
    dataroot_lq: C:\Dataset\val\DIV2K_valid_LR_x8
    filename_tmpl: '{}x8'
    io_backend:
      type: disk

# network structures
network_g:
  type: MGRN9
  num_in_ch: 3
  num_feat: 56
  num_block: 5
  num_out_ch: 3
  upscale: 8

# path
path:
  pretrain_network_g: C:\code\BSRN-main\experiments\MGRN9_x4_c56x5_2.5e_3_100K_adan_g256_ema_dw5,5,7_silu\models\net_g_895000.pth
  #D:\code\BSRN-main\experiments\MGRN6_x2_c56x5_LN_v2.5e_3_160K_adan_g192_ema_5_11_Multi\models\net_g_1325000.pth
  strict_load_g: true
  resume_state: ~

# training settings
train:
  ema_decay: 0.999
  optim_g:
    type: Adam
    lr: !!float 2e-5
    weight_decay: 0
    betas: [0.9, 0.99]

    # type: Adan
    # lr: !!float 2e-5
    # betas: [0.98, 0.92, 0.99]
    # weight_decay: 0
    # foreach: true

  scheduler:
    type: MultiStepLR
    milestones: [100000]
    gamma: 0.5

  total_iter: 200000
  warmup_iter: -1  # no warm up

  # losses
  pixel_opt:
    type: MSELoss
    loss_weight: 1.0
    reduction: mean

# validation settings
val:
  val_freq: !!float 5e3
  save_img: false

  metrics:
    psnr: # metric name, can be arbitrary
      type: calculate_psnr
      crop_border: 8
      test_y_channel: false
      better: higher  # the higher, the better. Default: higher

# logging settings
logger:
  print_freq: 100
  save_checkpoint_freq: !!float 5e3
  use_tb_logger: true
  wandb:
    project: ~
    resume_id: ~
    entity: ~

# dist training settings
dist_params:
  backend: nccl
  port: 29500