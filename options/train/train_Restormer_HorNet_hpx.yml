name: Restormer_HorNet_deblur_train_hpx_v2
model_type: SRModel
scale: 1
num_gpu: 1  # set num_gpu: 0 for cpu mode
manual_seed: 1

datasets:
  train:
    name: GoPro
    type: PairedImagePathTextDataset
    lq_file: D:\\file\\GOPRO\\train_blur_file.txt
    gt_file: D:\\file\\GOPRO\\train_sharp_file.txt
    dataroot: D:\\file\\GOPRO
    filename_tmpl: '{}'
    io_backend:
      type: disk
    # meta_info_file: hat/data/meta_info/meta_info_DF2Ksub_GT.txt

    gt_size: 192 #scale*48 or scale*64
    use_hflip: true
    use_rot: true

    # data loader
    use_shuffle: true
    num_worker_per_gpu: 6
    batch_size_per_gpu: 4
    dataset_enlarge_ratio: 1
    prefetch_mode: cuda
    pin_memory: True

  val:  # the 1st test dataset
    name: GoPro_subTest
    type: PairedImagePathTextDataset
    lq_file: D:\\file\\GOPRO\\test_blur_file_very_tiny.txt
    gt_file: D:\\file\\GOPRO\\test_sharp_file_very_tiny.txt
    dataroot: D:\\file\\GOPRO
    io_backend:
      type: disk



