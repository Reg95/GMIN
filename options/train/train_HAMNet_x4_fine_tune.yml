# general settings
name: HAMNet_C64_adam_ema_x2_fine_tune_10k
model_type: SRModel
scale: 2
num_gpu: 1  # set num_gpu: 0 for cpu mode
manual_seed: 42

# dataset and data loader settings
datasets:
  train:
    name: DF2K
    type: PairedImageDataset
    # dataroot_gt: datasets/DF2K/DF2K_train_HR_sub
    # dataroot_lq: datasets/DF2K/DF2K_train_LR_bicubic/X4_sub
    # meta_info_file: basicsr/data/meta_info/meta_info_DF2K3450sub_GT.txt
    # (for lmdb)
    dataroot_gt: D:\Dataset\DF2K\DF2K_train_HR_sub
    dataroot_lq: D:\Dataset\DF2K\DF2K_train_LR_bicubic_X2_sub

    io_backend:
       type: disk
      # (for lmdb)
#      type: lmdb

    gt_size: 480
    use_hflip: true
    use_rot: true

    # data loader
    num_worker_per_gpu: 6
    batch_size_per_gpu: 8
    dataset_enlarge_ratio: 100
    prefetch_mode: cuda
    pin_memory: true

  val:
    name: DIV2K_val
    type: PairedImageDataset
    dataroot_gt: E:\Dataset\valid\DIV2K_valid_HR\DIV2K_valid_HR
    dataroot_lq: E:\Dataset\valid\DIV2K_valid_LR_bicubic_X2\DIV2K_valid_LR_bicubic\X2
    filename_tmpl: '{}x2'
    io_backend:
      type: disk
#  val_1: # the 1st test dataset
#    name: Set5
#    type: PairedImageDataset
#    dataroot_gt: D:\Dataset\test\Set5\x4\HR
#    dataroot_lq: D:\Dataset\test\Set5\x4\LR
#    io_backend:
#      type: disk

# network structures
network_g:
  type: HAMNet_V1
  num_in_ch: 3
  num_feat: 64
  num_block: 8
  num_out_ch: 3
  upscale: 2

# path
path:
  pretrain_network_g: D:\code\BSRN-main\experiments\pretrained_models\net_g_845000.pth
  strict_load_g: false
  resume_state: ~

# training settings
train:
  ema_decay: 0.999
  optim_g:
    type: Adam
    lr: !!float 2e-5
    weight_decay: 0
    betas: [0.9, 0.99]

    # type: Adan
    # lr: !!float 2e-5
    # betas: [0.98, 0.92, 0.99]
    # weight_decay: 0
    # foreach: true

  scheduler:
    type: MultiStepLR
    milestones: [100000]
    gamma: 0.5

  total_iter: 100000
  warmup_iter: -1  # no warm up

  # losses
  pixel_opt:
    type: MSELoss
    loss_weight: 1.0
    reduction: mean

# validation settings
val:
  val_freq: !!float 5e3
  save_img: false

  metrics:
    psnr: # metric name, can be arbitrary
      type: calculate_psnr
      crop_border: 2
      test_y_channel: true
      better: higher  # the higher, the better. Default: higher

# logging settings
logger:
  print_freq: 100
  save_checkpoint_freq: !!float 5e3
  use_tb_logger: true
  wandb:
    project: ~
    resume_id: ~
    entity: ~

# dist training settings
dist_params:
  backend: nccl
  port: 29500