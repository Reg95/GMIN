# general settings
name: SRNet_x4_SSD_maskattn
model_type: SRModel
#model_type: ImageProcessModel
scale: 4
num_gpu: 1 # set num_gpu: 0 for cpu mode
manual_seed: 100

# dataset and data loader settings
datasets:
  train:
    name: DF2K
    type: PairedImageDataset
    #    dataroot_gt: /mnt/yxsun/Project/Data/datasets/DIV2K/DIV2K_train_HR_sub
    #    dataroot_lq: /mnt/yxsun/Project/Data/datasets/DIV2K/DIV2K_train_LR_bicubic/X4_sub
    #    (for lmdb)
    dataroot_gt:  /mnt/c/Dataset/train/DF2K_train_HR_sub  #C:\Dataset\DF2K\train\HR\x.lmdb
    dataroot_lq:  /mnt/c/Dataset/train/DF2K_train_LR_bicubic_X4_sub #C:\Dataset\DF2K\train\LR\x4.lmdb
#    meta_info_file: C:\code\BSRN-main\meta_info\DF2K_train.txt
    filename_tmpl: '{}'
    io_backend:
      type: disk
      # (for lmdb)
      # type: lmdb

    gt_size: 192
    use_hflip: true
    use_rot: true

    # data loader
    use_shuffle: true
    num_worker_per_gpu: 8
    batch_size_per_gpu: 32
    dataset_enlarge_ratio: 100
    prefetch_mode: cuda
    pin_memory: true

  val_1: # the 1st test dataset
    name: Set5
    type: PairedImageDataset
    dataroot_gt: /mnt/c/Dataset/test/Set5/HR
    dataroot_lq: /mnt/c/Dataset/test/Set5/LR_bicubic\X4
    filename_tmpl: '{}x4'
    io_backend:
      type: disk

  val_2: # the 2st test dataset
    name: Set14
    type: PairedImageDataset
    dataroot_gt: C:\Dataset\test\Set14\HR
    dataroot_lq: C:\Dataset\test\Set14\LR_bicubic\X4
    filename_tmpl: '{}x4'
    io_backend:
      type: disk
#
#  val_3:
#    name: DF2K_val_10
#    type: PairedImageDataset
#    dataroot_gt: C:\Dataset\val\DIV2K_valid_HR_10\DIV2K_valid_HR
#    dataroot_lq: C:\Dataset\val\DIV2K_valid_LR_bicubic_X4_10\DIV2K_valid_LR_bicubic\X4
#    filename_tmpl: '{}x4'
##    meta_info_file: datasets/meta_info/DF2K_val_10.txt
##    # meta_info_file: datasets/meta_info/DF2K_val.txt # if you prefer to use the complete DIV2K validation set
#    io_backend:
#      type: disk

# network structures
network_g:
  type: SRNet
#  num_in_ch: 3
#  num_feat: 56
#  num_block: 4
#  num_out_ch: 3
#  upscale: 4


# path
path:
  pretrain_network_g: ~ #C:\code\BSRN-main\experiments\MAGN_C56_adan_ema_x2_DF2K_fine_tune_10k_ffn-dw5\models\net_g_125000.pth
  strict_load_g: false
  resume_state: ~

# training settings
train:
#  optim_g:
#    type: Adam
#    lr: !!float 5e-4
#    weight_decay: 0
#    betas: [0.9, 0.999]

#    type: Adan
#    lr: !!float 5e-3
#    betas: [ 0.98, 0.92, 0.99 ]
#    weight_decay: 0
#    foreach: true
#
#  scheduler:
#    type: CosineAnnealingRestartLR
#    periods: [1600000]
#    restart_weights: [1]
#    eta_min: !!float 1e-9

  ema_decay: 0.999
  optim_g:
#    type: Adam
#    lr: !!float 5e-4
#    weight_decay: 0
#    betas: [0.9, 0.99]

    type: Adan
    lr: !!float 2.5e-3
    betas: [ 0.98, 0.92, 0.99 ]
    weight_decay: 0
    foreach: true

#    type: AdamW
#    lr: !!float 5e-4
#    weight_decay: !!float 1e-4
#    betas: [0.9, 0.999]

  scheduler:
    type: MultiStepLR
    milestones: [600000,800000]
    gamma: 0.5

#  scheduler:
#    type: MultiStepLR
#    milestones: [800000, 1200000, 140000, 1500000]
#    gamma: 0.5

#  scheduler:
#    type: CosineAnnealingRestartLR
#    periods: [1000000]
#    restart_weights: [1]
#    eta_min: !!float 1e-7

  total_iter: 1000000
  warmup_iter: -1  # no warm up
#  scheduler:
#    type: MultiStepLR
#    milestones: [ 1000000 ]
#    gamma: 0.5
#
#  total_iter: 1000000
#  warmup_iter: -1  # no warm up

  # losses
  pixel_opt:
    type: L1Loss
    loss_weight: 1.0
    reduction: mean

# validation settings
val:
#  window_size: 0
  val_freq: 5000
  save_img: false

  metrics:
    psnr: # metric name, can be arbitrary
      type: calculate_psnr
      crop_border: 4
      test_y_channel: true

# logging settings
logger:
  print_freq: 100
  save_checkpoint_freq: !!float 5e3
  use_tb_logger: true
  wandb:
    project: ~
    resume_id: ~
    entity: ~

# dist training settings
dist_params:
  backend: nccl
  port: 29500
