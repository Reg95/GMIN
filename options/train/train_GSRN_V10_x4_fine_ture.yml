# general settings
name: GSRN_x4_9-12_V1
model_type: SRModel
scale: 4
num_gpu: 1  # set num_gpu: 0 for cpu mode
manual_seed: 42

# dataset and data loader settings
datasets:
  train:
    name: DF2K
    type: PairedImageDataset
#    dataroot_gt: /mnt/yxsun/Project/Data/datasets/DIV2K/DIV2K_train_HR_sub
#    dataroot_lq: /mnt/yxsun/Project/Data/datasets/DIV2K/DIV2K_train_LR_bicubic/X4_sub
#    (for lmdb)
    dataroot_gt: D:\Dataset\DIV2K\train\DIV2K_train_HR_sub
    dataroot_lq: D:\Dataset\DIV2K\train\DIV2K_train_LR_bicubic_X4_sub
    filename_tmpl: '{}'
    io_backend:
      type: disk
      # (for lmdb)
      # type: lmdb

    gt_size: 480
    use_hflip: true
    use_rot: true

    # data loader
    use_shuffle: true
    num_worker_per_gpu: 6
    batch_size_per_gpu: 32
    dataset_enlarge_ratio: 100
    prefetch_mode: cuda
    pin_memory: true

#  val:
#    name: DIV2K_val
#    type: PairedImageDataset
#    dataroot_gt: E:\Dataset\valid\DIV2K_valid_HR\DIV2K_valid_HR
#    dataroot_lq: E:\Dataset\valid\DIV2K_valid_LR_bicubic_X4\DIV2K_valid_LR_bicubic\X4
#    filename_tmpl: '{}x4'
#    io_backend:
#      type: disk
  val: # the 2st test dataset
    name: Set14
    type: PairedImageDataset
    dataroot_gt: E:\Dataset\test\Set14\HR
    dataroot_lq: E:\Dataset\test\Set14\LR_bicubic\X4
    filename_tmpl: '{}x4'
    io_backend:
      type: disk

#  val: # the 1st test dataset
#    name: Set5
#    type: PairedImageDataset
#    dataroot_gt: E:\Dataset\test\Set5\HR
#    dataroot_lq: E:\Dataset\test\Set5\LR_bicubic\X4
#    filename_tmpl: '{}x4'
#    io_backend:
#      type: disk


# network structures
network_g:
  type: GSRN_V10
  num_in_ch: 3
  num_feat: 64
  num_block: 8
  num_out_ch: 3
  upscale: 4
  conv: VoVGSConv

# path
path:
  pretrain_network_g:  D:\code\BSRN-main\experiments\pretrained_models\net_g_695000.pth
  strict_load_g: true
  resume_state: ~

# training settings
train:
  ema_decay: 0.999
  optim_g:
    type: Adam
    lr: !!float 2e-5
    weight_decay: 0
    betas: [0.9, 0.99]

    # type: Adan
    # lr: !!float 2e-5
    # betas: [0.98, 0.92, 0.99]
    # weight_decay: 0
    # foreach: true

  scheduler:
    type: MultiStepLR
    milestones: [100000]
    gamma: 0.5

  total_iter: 100000
  warmup_iter: -1  # no warm up

  # losses
  pixel_opt:
    type: MSELoss
    loss_weight: 1.0
    reduction: mean

# validation settings
val:
  val_freq: !!float 5e3
  save_img: false

  metrics:
    psnr: # metric name, can be arbitrary
      type: calculate_psnr
      crop_border: 4
      test_y_channel: true

# logging settings
logger:
  print_freq: 100
  save_checkpoint_freq: !!float 5e3
  use_tb_logger: true
  wandb:
    project: ~
    resume_id: ~
    entity: ~

# dist training settings
dist_params:
  backend: nccl
  port: 29500
