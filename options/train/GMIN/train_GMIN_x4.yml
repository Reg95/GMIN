# general settings
name: GMIN_x4_c56x5_LN_v2.5e_3_160K_adan_g192_V2
model_type: SRModel
scale: 4
num_gpu: 1  # set num_gpu: 0 for cpu mode
manual_seed: 100

# dataset and data loader settings
datasets:
  train:
    name: DF2K
    type: PairedImageDataset
    dataroot_gt: C:\Dataset\train\DF2K_train_HR_sub   #C:\Dataset\DF2K\train\HR\x.lmdb
    dataroot_lq: C:\Dataset\train\DF2K_train_LR_bicubic_X4_sub #C:\Dataset\DF2K\train\LR\x4.lmdb
    #    (for lmdb)
#    dataroot_gt: D:\dataset\sr_data\DF2K\train\HR\x.lmdb
#    dataroot_lq: D:\dataset\sr_data\DF2K\train\LR\x4.lmdb
#    meta_info_file: D:\code\BSRN-main\meta_info\DF2K_train.txt
    io_backend:
      type: disk
      # (for lmdb)2
      # type: lmdb

    gt_size: 192
    use_hflip: true
    use_rot: true

    # data loader
    use_shuffle: true
    num_worker_per_gpu: 6
    batch_size_per_gpu: 32
    dataset_enlarge_ratio: 100
#    prefetch_mode: cuda
#    pin_memory: true

  val_1: # the 1st test dataset
    name: Set5
    type: PairedImageDataset
    dataroot_gt: D:\dataset\sr_data\Set5\HR\x4.lmdb
    dataroot_lq: D:\dataset\sr_data\Set5\LR\x4.lmdb
    io_backend:
      type: lmdb

  val_2: # the 2st test dataset
    name: Set14
    type: PairedImageDataset
    dataroot_gt: D:\dataset\sr_data\Set14\HR\x4.lmdb
    dataroot_lq: D:\dataset\sr_data\Set14\LR\x4.lmdb
    io_backend:
      type: lmdb

# network structures
network_g:
  type: GMIN
  num_in_ch: 3
  num_feat: 56
  num_block: 5
  num_out_ch: 3
  upscale: 4


# path
path:
  pretrain_network_g: C:\code\BSRN-main\experiments\GMIN_C56_adan_ema_x4_DF2K_fine_tune_10k\models\net_g_100000.pth
  strict_load_g: true
  resume_state: ~

# training settings
train:

  ema_decay: 0.999
  optim_g:
#    type: Adam
#    lr: !!float 5e-4
#    weight_decay: 0
#    betas: [0.9, 0.99]

    type: Adan
    lr: !!float 2.5e-3
    betas: [ 0.98, 0.92, 0.99 ]
    weight_decay: 0
    foreach: true

#    type: AdamW
#    lr: !!float 5e-4
#    weight_decay: !!float 1e-4
#    betas: [0.9, 0.999]

  scheduler:
    type: MultiStepLR
    milestones: [600000,800000]
    gamma: 0.5


  total_iter: 1000000
  warmup_iter: -1  # no warm up

  # losses
  pixel_opt:
    type: L1Loss
    loss_weight: 1.0
    reduction: mean

# validation settings
val:
  val_freq: 5000
  save_img: false

  metrics:
    psnr: # metric name, can be arbitrary
      type: calculate_psnr
      crop_border: 4
      test_y_channel: true

# logging settings
logger:
  print_freq: 100
  save_checkpoint_freq: !!float 5e3
  use_tb_logger: true
  wandb:
    project: ~
    resume_id: ~
    entity: ~

# dist training settings
dist_params:
  backend: nccl
  port: 29500
