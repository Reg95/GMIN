# general settings
name: test_GMIN_x3_C56B5_L1_1000k_v1
model_type: SRModel
scale: 3
num_gpu: 2  # set num_gpu: 0 for cpu mode
manual_seed: 0

# dataset and data loader settings
datasets:
  train:
    name: DF2K
    type: PairedImageDataset
#    dataroot_gt: /mnt/yxsun/Project/Data/datasets/DIV2K/DIV2K_train_HR_sub
#    dataroot_lq: /mnt/yxsun/Project/Data/datasets/DIV2K/DIV2K_train_LR_bicubic/X4_sub
#    (for lmdb)
    dataroot_gt: C:\Dataset\train\DF2K_train_HR_sub
    dataroot_lq: C:\Dataset\train\DF2K_train_LR_bicubic_X3_sub
    filename_tmpl: '{}'
    io_backend:
      type: disk
      # (for lmdb)
      # type: lmdb

    gt_size: 144
    use_hflip: true
    use_rot: true

    # data loader
    use_shuffle: true
    num_worker_per_gpu: 3
    batch_size_per_gpu: 32
    dataset_enlarge_ratio: 100
    prefetch_mode: ~

  val_1:
    name: Set5
    type: PairedImageDataset
    dataroot_gt: C:\Dataset\test\Set5\HR
    dataroot_lq: C:\Dataset\test\Set5\LR_bicubic\X3
    filename_tmpl: '{}x3'
    io_backend:
      type: disk

  val_2: # the 2st test dataset
    name: Set14
    type: PairedImageDataset
    dataroot_gt: D:\Dataset\test\Set14\HR
    dataroot_lq: D:\Dataset\test\Set14\LR_bicubic\X3
    filename_tmpl: '{}x3'
    io_backend:
      type: disk

# network structures
network_g:
  type: GMIN
  num_in_ch: 3
  num_feat: 56
  num_block: 5
  num_out_ch: 3
  upscale: 3
  # change_c: 15
#  conv: BSConvU

# path
path:
  pretrain_network_g: C:\code\BSRN-main\experiments\GMIN_x3_c56x5_2.5e_3_100K_adan_g144_conv1_v1\models\net_g_945000.pth
  strict_load_g: true
  resume_state: ~

# training settings
train:
  ema_decay: 0.999
  optim_g:
    type: Adan
    lr: !!float 3e-3
    betas: [ 0.98, 0.92, 0.99 ]
    weight_decay: 0
    foreach: true

  scheduler:
    type: CosineAnnealingRestartLR
    periods: [1000000]
    restart_weights: [1]
    eta_min: !!float 1e-7

  total_iter: 1000000
  warmup_iter: -1  # no warm up

  # losses
  pixel_opt:
    type: L1Loss
    loss_weight: 1.0
    reduction: mean

# validation settings
val:
  val_freq: !!float 5e3
  save_img: false

  metrics:
    psnr: # metric name, can be arbitrary
      type: calculate_psnr
      crop_border: 3
      test_y_channel: true

# logging settings
logger:
  print_freq: 100
  save_checkpoint_freq: !!float 5e3
  use_tb_logger: true
  wandb:
    project: ~
    # project: ~
    resume_id: ~
    # entity: ~
    entity: ~

# dist training settings
dist_params:
  backend: nccl
  port: 29500
