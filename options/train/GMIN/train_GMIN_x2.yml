# general settings
name: train_GMIN_x2_1000k
model_type: SRModel
scale: 2
num_gpu: 1  # set num_gpu: 0 for cpu mode
manual_seed: 100

# dataset and data loader settings
datasets:
  train:
    name: DF2K
    type: PairedImageDataset
#    dataroot_gt: /mnt/yxsun/Project/Data/datasets/DIV2K/DIV2K_train_HR_sub
#    dataroot_lq: /mnt/yxsun/Project/Data/datasets/DIV2K/DIV2K_train_LR_bicubic/X4_sub
#    (for lmdb)
    dataroot_gt:  C:\Dataset\train\DF2K_train_HR_sub  #C:\Dataset\DF2K\train\HR\x.lmdb
    dataroot_lq:  C:\Dataset\train\DF2K_train_LR_bicubic_X2_sub #C:\Dataset\DF2K\train\LR\x4.lmdb
    filename_tmpl: '{}'
    io_backend:
      type: disk
      # (for lmdb)
      # type: lmdb

    gt_size: 96
    use_hflip: true
    use_rot: true

    # data loader
    use_shuffle: true
    num_worker_per_gpu: 3
    batch_size_per_gpu: 32
    dataset_enlarge_ratio: 100
    prefetch_mode: ~

  val:
    name: Set5
    type: PairedImageDataset
    dataroot_gt: D:\Dataset\test\Set5\HR
    dataroot_lq: D:\Dataset\test\Set5\LR_bicubic\X2
    filename_tmpl: '{}x2'
    io_backend:
      type: disk

# network structures
network_g:
  type: GMIN
  num_in_ch: 3
  num_feat: 56
  num_block: 5
  num_out_ch: 3
  upscale: 2

# path
path:
  pretrain_network_g:  C:\code\BSRN-main\experiments\GMIN_x2_c56x5_3e_3_100K_adan_g128_ffd\models\net_g_865000.pth
  strict_load_g: true
  resume_state: 

# training settings
train:
  optim_g:
    type: Adam
    lr: !!float 1e-3
    weight_decay: 0
    betas: [0.9, 0.999]

  scheduler:
    type: CosineAnnealingRestartLR
    periods: [1000000]
    restart_weights: [1]
    eta_min: !!float 1e-7

  total_iter: 1000000
  warmup_iter: -1  # no warm up

  # losses
  pixel_opt:
    type: L1Loss
    loss_weight: 1.0
    reduction: mean

# validation settings
val:
  val_freq: !!float 5e3
  save_img: true

  metrics:
    psnr: # metric name, can be arbitrary
      type: calculate_psnr
      crop_border: 2
      test_y_channel: true

# logging settings
logger:
  print_freq: 100
  save_checkpoint_freq: !!float 5e3
  use_tb_logger: true
  wandb:
    project: ~
    # project: ~
    resume_id: ~
    # entity: ~
    entity: ~

# dist training settings
dist_params:
  backend: nccl
  port: 29500
