name: Debluring_SLKv1
#model_type: ImageRestorationModel
model_type: SRModel
scale: 1
num_gpu: 1  # set num_gpu: 0 for cpu mode
manual_seed: 2

datasets:
  train:
    name: GoPro
    type: PairedImagePathTextDataset
    lq_file:  /mnt/d/file/GOPRO/train_blur_file.txt
    gt_file: /mnt/d/file/GOPRO/train_sharp_file.txt
    dataroot: /mnt/d/file/GOPRO
    filename_tmpl: '{}'
    io_backend:
      type: disk
    # meta_info_file: hat/data/meta_info/meta_info_DF2Ksub_GT.txt
#    name: rain13
#    type: PairedImageDataset
#    dataroot_lq:  D:\\Dataset\\train\\Rain13K\\input
#    dataroot_gt:  D:\\Dataset\\train\\Rain13K\\target
#    io_backend:
#      type: disk

    gt_size: 128 #scale*48 or scale*64
    use_hflip: true
    use_rot: true

    # data loader
    use_shuffle: true
    num_worker_per_gpu: 6
    batch_size_per_gpu: 2
    dataset_enlarge_ratio: 1
    prefetch_mode: cuda
    pin_memory: True

  val:  # the 1st test dataset
    name: GoPro_subTest
    type: PairedImagePathTextDataset
    lq_file: /mnt/d/file/GOPRO/test_blur_file_very_tiny.txt
    gt_file: /mnt/d/file/GOPRO/test_sharp_file_very_tiny.txt
    dataroot:  /mnt/d/file/GOPRO
    io_backend:
      type: disk



# network structures
network_g:
  type: GLSKN_1
#  inp_channels: 3
#  out_channels: 3
#  dim: 48
#  num_blocks: [4, 4, 4, 4]
#  num_refinement_blocks: 4
#  heads: [1, 2, 4, 8]
#  ffn_expansion_factor: 2.66
#  bias: False
#  LayerNorm_type: 'WithBias'  ## Other option 'BiasFree'
#  dual_pixel_task: False  # True for dual-pixel defocus deblurring only. Also set inp_channels=6


# path
path:
  pretrain_network_g: ~ # C:\code\BSRN-main\experiments\Deblur_GLSKN_G128_MBV11\models\net_g_985000.pth
  strict_load_g: true
  param_key_g: ~ #'params_ema' # only for MAN, for MAN-T and MAN-L, using ~

# validation settings
val:
  val_freq: !!float 5e3
  save_img: false
  suffix: ~  # add suffix to saved images, if None, use exp name

  metrics:
    psnr: # metric name, can be arbitrary
      type: calculate_psnr
      crop_border: 0
      test_y_channel: true
    ssim:
      type: calculate_ssim
      crop_border: 0
      test_y_channel: true



train:
#  ema_decay: 0.999
  optim_g:
    type: Adam
    lr: !!float 2e-4
    weight_decay: 0
    betas: [0.9, 0.999]

#
  scheduler:
    type: CosineAnnealingRestartLR
    periods: [1000000]
    restart_weights: [1]
    eta_min: !!float 1e-6


  total_iter: 1000000
  warmup_iter: -1  # no warm up

  # losses
  pixel_opt:
    type: L1Loss
    loss_weight: 1.0
    reduction: mean

#  fft_loss_opt:
#    type: FFTLoss
#    loss_weight: 0.1
#    reduction: mean
# logging settings
logger:
  print_freq: 500
  save_checkpoint_freq: !!float 5e3
  use_tb_logger: true
  wandb:
    project: ~
    resume_id: ~

# dist training settings
dist_params:
  backend: nccl
  port: 29500

