name: test_GMIN_x3_C56B5_Final
suffix: ~  # add suffix to saved images
model_type: SRModel
scale: 3
crop_border: ~  # crop border when evaluation. If None, crop the scale pixels
num_gpu: 1  # set num_gpu: 0 for cpu mode
manual_seed: 100

datasets:
  test_1: # the 1st test dataset
    name: Set5
    type: PairedImageDataset
    dataroot_gt: D:\Dataset\test\Set5\HR
    dataroot_lq: D:\Dataset\test\Set5\LR_bicubic\X3
    filename_tmpl: '{}x3'
    io_backend:
      type: disk
  test_2: # the 2st test dataset
    name: Set14
    type: PairedImageDataset
    dataroot_gt: D:\Dataset\test\Set14\HR
    dataroot_lq: D:\Dataset\test\Set14\LR_bicubic\X3
    filename_tmpl: '{}x3'
    io_backend:
      type: disk

  test_3:
    name: BSD100
    type: PairedImageDataset
    dataroot_gt: D:\Dataset\test\B100\HR
    dataroot_lq: D:\Dataset\test\B100\LR_bicubic\X3
    filename_tmpl: '{}x3'
    io_backend:
      type: disk

  test_4:
    name: Urban100
    type: PairedImageDataset
    dataroot_gt: D:\Dataset\test\Urban100\HR
    dataroot_lq: D:\Dataset\test\Urban100\LR_bicubic\X3
    filename_tmpl: '{}x3'
    io_backend:
      type: disk

  test_5:
    name: Manga109
    type: PairedImageDataset
    dataroot_gt: D:\Dataset\test\Manga109\HR
    dataroot_lq: D:\Dataset\test\Manga109\LR_bicubic\X3
    filename_tmpl: '{}x3'
    io_backend:
      type: disk


# network structures
network_g:
  type: GMIN
  num_in_ch: 3
  num_feat: 56
  num_block: 5
  num_out_ch: 3
  upscale: 3

# path
path:
  pretrain_network_g: C:\code\BSRN-main\experiments\GMIN_C56_adan_ema_x3_DF2K_v2\models\net_g_95000.pth
  param_key_g: params_ema
  strict_load_g: true

# validation settings
val:
  save_img: false
  suffix: ~  # add suffix to saved images, if None, use exp name
  pbar: true
  metrics:
    psnr: # metric name, can be arbitrary
      type: calculate_psnr
      crop_border: 3
      test_y_channel: true
    ssim:
      type: calculate_ssim
      crop_border: 3
      test_y_channel: true
