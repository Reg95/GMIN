name: test_GSRN_x3_V10_v3_2_27_v3
suffix: ~  # add suffix to saved images
model_type: SRModel
scale: 3
crop_border: ~  # crop border when evaluation. If None, crop the scale pixels
num_gpu: 1  # set num_gpu: 0 for cpu mode
manual_seed: 0

datasets:
  test_1: # the 1st test dataset
    name: val_set5
    type: PairedImageDataset
    dataroot_gt: D:\Dataset\test\Set5\x3\HR
    dataroot_lq: D:\Dataset\test\Set5\x3\LR
    io_backend:
      type: disk
  test_2: # the 2st test dataset
    name: val_set14
    type: PairedImageDataset
    dataroot_gt: D:\Dataset\test\Set14\x3\HR
    dataroot_lq: D:\Dataset\test\Set14\x3\LR
    io_backend:
      type: disk

  test_3:
    name: BSD100
    type: PairedImageDataset
    dataroot_gt: D:\Dataset\test\BSDS100\x3\HR
    dataroot_lq: D:\Dataset\test\BSDS100\x3\LR
    io_backend:
      type: disk

  test_4:
    name: Urban100
    type: PairedImageDataset
    dataroot_gt: D:\Dataset\test\Urban100\x3\HR
    dataroot_lq: D:\Dataset\test\Urban100\x3\LR
    io_backend:
      type: disk

  test_5:
    name: Manga109
    type: PairedImageDataset
    dataroot_gt: D:\Dataset\test\Manga109\x3\HR
    dataroot_lq: D:\Dataset\test\Manga109\x3\LR
    io_backend:
      type: disk


# network structures
network_g:
  type: GSRN_V10
  num_in_ch: 3
  num_feat: 64
  num_block: 8
  num_out_ch: 3
  upscale: 3
  # change_c: 15
  conv: VoVGSConv

# path
path:
  pretrain_network_g: D:\code\BSRN-main\experiments\pretrained_models\net_g_865000.pth
  strict_load_g: false

# validation settings
val:
  save_img: true
  suffix: ~  # add suffix to saved images, if None, use exp name
  pbar: true
  metrics:
    psnr: # metric name, can be arbitrary
      type: calculate_psnr
      crop_border: 3
      test_y_channel: true
    ssim:
      type: calculate_ssim
      crop_border: 3
      test_y_channel: true
