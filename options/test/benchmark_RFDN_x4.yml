# network structures
network_g:
  type: RFDN
  in_nc: 3
  out_nc: 3
  nf: 50
  num_modules: 4
  upscale: 4
#  res_scale: 0.1
#  img_range: 255.
#  rgb_mean: [0.4488, 0.4371, 0.4040]

# path
path:
  pretrain_network_g:  N:\code\BSRN-main\experiments\pretrained_models\RFDN_AIM.pth
  strict_load_g: true

# validation settings
val:
  save_img: true
  suffix: ~  # add suffix to saved images, if None, use exp name
  pbar: true
  metrics:
    psnr: # metric name, can be arbitrary
      type: calculate_psnr
      crop_border: 4
      test_y_channel: true
    ssim:
      type: calculate_ssim
      crop_border: 4
      test_y_channel: true
