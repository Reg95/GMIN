name: test_HAMNet_V2_x4
suffix: ~  # add suffix to saved images
model_type: SRModel
scale: 4   ####2,3,4
crop_border: ~  # crop border when evaluation. If None, crop the scale pixels
num_gpu: 1  # set num_gpu: 0 for cpu mode
manual_seed: 100

datasets:
  test_1: # the 1st test dataset
    name: val_set5
    type: PairedImageDataset
    dataroot_gt: D:\Dataset\test\Set5\x4\HR
    dataroot_lq: D:\Dataset\test\Set5\x4\LR
    io_backend:
      type: disk
  test_2: # the 2st test dataset
    name: val_set14
    type: PairedImageDataset
    dataroot_gt: D:\Dataset\test\Set14\GTmod12
    dataroot_lq: D:\Dataset\test\Set14\LRbicx4
    io_backend:
      type: disk

  test_3:
    name: BSD100
    type: PairedImageDataset
    dataroot_gt: D:\Dataset\test\BSDS100\x4\HR
    dataroot_lq: D:\Dataset\test\BSDS100\x4\LR
    io_backend:
      type: disk

  test_4:
    name: Urban100
    type: PairedImageDataset
    dataroot_gt: D:\Dataset\test\Urban100\x4\HR
    dataroot_lq: D:\Dataset\test\Urban100\x4\LR
    io_backend:
      type: disk

  test_5:
    name: Manga109
    type: PairedImageDataset
    dataroot_gt: D:\Dataset\test\Manga109\x4\HR
    dataroot_lq: D:\Dataset\test\Manga109\x4\LR
    io_backend:
      type: disk
#  test_6:
#    name: RealSRSet
#    type: PairedImageDataset
#    dataroot_gt: D:\Dataset\test\RealSRSet\HR
#    dataroot_lq: D:\Dataset\test\RealSRSet\LR
#    io_backend:
#      type: disk
# network structures
network_g:
  type: HAMNet_V2
  num_in_ch: 3
  num_feat: 56
  num_block: 4
  num_out_ch: 3
  upscale: 4  ####2,3,4
  # change_c: 15

# path
path:
  pretrain_network_g:  D:\code\BSRN-main\experiments\HAMNet_x4_B32_C56_l1e-3_g192_Adan_v1\models\net_g_895000.pth   #3 net_g_830000.pth
#  pretrain_network_g:   D:\code\BSRN-main\experiments\pretrained_models\net_g_5000.pth   #3 net_g_830000.pth
#  pretrain_network_g:  D:\code\BSRN-main\experiments\pretrained_models\net_g_845000.pth  #2
#  pretrain_network_g:  D:\code\BSRN-main\experiments\pretrained_models\net_g_695000.pth  #4
  strict_load_g: false

# validation settings
val:
  save_img: false
  suffix: ~  # add suffix to saved images, if None, use exp name
  pbar: true
  metrics:
    psnr: # metric name, can be arbitrary
      type: calculate_psnr
      crop_border: 4
      test_y_channel: true
    ssim:
      type: calculate_ssim
      crop_border: 4
      test_y_channel: true
